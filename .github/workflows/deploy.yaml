name: deploy

on:
  push:
    branches: [main, experimento]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: aplica os manifestos
        run: kubectl apply -f app/

      - name: aguarda o rollout
        run: kubectl rollout status deployment/app-teste --timeout=120s
